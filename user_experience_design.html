<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>User Experience Design</title>
    <link rel="stylesheet" type="text/css" href="css/main.css" />
    <link rel="stylesheet" media="only screen and (max-width: 480px)" href="css/mobile.css" />
    <link rel="stylesheet" media="only screen and (min-width: 481px) and (max-width: 960px)" href="css/tablet.css" />
    <link rel="stylesheet" media="only screen and (min-width: 961px)" href="css/desktop.css" />
    <meta name="viewport" content="initial-scale=1" />
    <style>
      section.prototype a {
        display: inline-block;
        padding: 12px 24px;
        background-color: #333;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 16px;
        margin-top: 10px;
      }
      section.prototype a:hover {
        background-color: #555;
      }
      .wireframes-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 16px;
      }
      .wireframes-grid figure {
        margin: 0;
        text-align: center;
      }
      .wireframes-grid img {
        width: 100%;
        max-width: 220px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
      }
      .wireframes-grid figcaption {
        margin-top: 6px;
        font-size: 13px;
        color: #666;
      }
      section.site_map img {
        width: 100%;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">

      <header>
        <h1>User Experience Design</h1>
      </header>

      <nav>
        <a href="index.html">Home</a>
        <a href="about_me.html">About Me</a>
        <a href="more_about_me.html">More About Me</a>
        <a href="topic_of_interest.html">My Crafts</a>
      </nav>

      <main>
        <div class="column1">
          <section class="prototype">
            <h2>Clickable Prototype</h2>
            <p>Click the link below to view the interactive prototype for Paw &amp; Hope, a stray animal rescue and adoption website.</p>
            <a href="https://www.figma.com/proto/BE4XeBfMyFdgH1JExrzane/Untitled?node-id=4-89&p=f&t=zPwSf8QIU68DkQEj-1&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=1%3A844" target="_blank">View Clickable Prototype</a>
          </section>
          <section class="site_map">
            <h2>Site Map</h2>
            <img src="ux/sitemap.png" alt="Site map of Paw and Hope website" />
          </section>
        </div>

        <div class="column2">
          <section class="wireframes">
            <h2>Wireframes</h2>
            <div class="wireframes-grid">
              <figure>
                <img src="ux/Home.png" alt="Home page wireframe" />
                <figcaption>Home</figcaption>
              </figure>
              <figure>
                <img src="ux/Adopt.png" alt="Adopt page wireframe" />
                <figcaption>Adopt</figcaption>
              </figure>
              <figure>
                <img src="ux/Adopt Cat Filter.png" alt="Adopt Cat Filter wireframe" />
                <figcaption>Adopt – Cat Filter</figcaption>
              </figure>
            </div>
          </section>
        </div>

        <div class="column3">
          <section class="wireframes">
            <h2>&nbsp;</h2>
            <div class="wireframes-grid">
              <figure>
                <img src="ux/Rescue.png" alt="Rescue page wireframe" />
                <figcaption>Rescue</figcaption>
              </figure>
              <figure>
                <img src="ux/Donate.png" alt="Donate page wireframe" />
                <figcaption>Donate</figcaption>
              </figure>
              <figure>
                <img src="ux/Contact.png" alt="Contact page wireframe" />
                <figcaption>Contact</figcaption>
              </figure>
            </div>
          </section>
        </div>
      </main>

      <footer>
        <p>&copy; 2026 Rei Li</p>
      </footer>

    </div>
  </body>
</html>
